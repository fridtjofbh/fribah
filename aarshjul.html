<style>

.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}

tbody td:nth-child(2){text-align:left;font-size:11px;color:#888}
tbody td:nth-child(3){text-align:right;color:#888;font-size:11px}
.hcell{border-radius:3px;min-width:48px}
.legend{display:flex;align-items:center;gap:8px;margin-top:12px}
.legend span{font-size:12px;color:#999}
.legend .bar{width:120px;height:12px;border-radius:6px;background:linear-gradient(to right,#E6F1FB,#378ADD,#042C53)}
.tag-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.tracked{display:inline-block;font-size:9px;color:#1D9E75;border:1px solid #1D9E75;border-radius:3px;padding:0 4px;margin-left:6px;vertical-align:middle;line-height:16px}
.summary{font-size:13px;color:#666;margin-bottom:8px}
</style>

const tagColors = {
  'Tape':'#534AB7','Annet':'#73726c','Plast & Beskyttelse':'#1D9E75',
  'Eske & Kartong':'#D85A30','Poser':'#D4537E','Etiketter':'#378ADD',
  'Pall & Transport':'#BA7517','Skum':'#639922','#I/T':'#999'
};

const tags = [...new Set(kw.map(k=>k.t))].sort();
const tagSel = document.getElementById('tagFilter');
tags.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tagSel.appendChild(o); });

function lerp(a,b,t){ return a+(b-a)*t; }

function heatBg(val, min, max){
  if(max===min) return '#B5D4F4';
  const norm = (val-min)/(max-min);
  if(norm < 0.5){
    const t = norm*2;
    return `rgb(${Math.round(lerp(230,133,t))},${Math.round(lerp(241,195,t))},${Math.round(lerp(251,235,t))})`;
  }
  const t = (norm-0.5)*2;
  return `rgb(${Math.round(lerp(133,4,t))},${Math.round(lerp(195,44,t))},${Math.round(lerp(235,83,t))})`;
}

function heatTx(val, min, max){
  if(max===min) return '#042C53';
  const norm = (val-min)/(max-min);
  return norm > 0.6 ? '#E6F1FB' : '#042C53';
}

function seasonality(v){
  const avg = v.reduce((s,x)=>s+x,0)/12;
  if(avg===0) return 0;
  return Math.sqrt(v.reduce((s,x)=>s+Math.pow(x-avg,2),0)/12)/avg;
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const tagF = document.getElementById('tagFilter').value;
  const trackF = document.getElementById('trackFilter').value;
  const scaleMode = document.getElementById('scaleMode').value;
  const sortMode = document.getElementById('sortMode').value;
  const limitMode = document.getElementById('limitMode').value;

  let data = kw.filter(k => {
    if(search && !k.n.toLowerCase().includes(search)) return false;
    if(tagF !== 'all' && k.t !== tagF) return false;
    if(trackF === 'yes' && !k.tr) return false;
    if(trackF === 'no' && k.tr) return false;
    return true;
  });

  if(sortMode==='volume') data.sort((a,b)=>b.v.reduce((s,x)=>s+x,0)-a.v.reduce((s,x)=>s+x,0));
  else if(sortMode==='alpha') data.sort((a,b)=>a.n.localeCompare(b.n,'nb'));
  else if(sortMode==='tag') data.sort((a,b)=>a.t.localeCompare(b.t,'nb')||b.v.reduce((s,x)=>s+x,0)-a.v.reduce((s,x)=>s+x,0));
  else if(sortMode==='seasonal') data.sort((a,b)=>seasonality(b.v)-seasonality(a.v));

  const total = data.length;
  if(limitMode !== 'all') data = data.slice(0, parseInt(limitMode));

  document.getElementById('summary').textContent = `Viser ${data.length} av ${total} søkeord`;

  const allVals = data.flatMap(d=>d.v);
  const gMin = Math.min(...allVals), gMax = Math.max(...allVals);

  let hdr = '<th>Søkeord</th><th>Kategori</th><th>Snitt</th>';
  months.forEach(m => hdr += `<th>${m}</th>`);
  document.getElementById('headerRow').innerHTML = hdr;

  let html = '';
  data.forEach(d => {
    const rMin = Math.min(...d.v), rMax = Math.max(...d.v);
    const useMin = scaleMode==='row' ? rMin : gMin;
    const useMax = scaleMode==='row' ? rMax : gMax;
    const avg = Math.round(d.v.reduce((s,x)=>s+x,0)/12);
    const dot = tagColors[d.t]||'#888';
    const trackedBadge = d.tr ? '<span class="tracked">T</span>' : '';

    html += '<tr>';
    html += `<td title="${d.n}"><span class="tag-dot" style="background:${dot}"></span>${d.n}${trackedBadge}</td>`;
    html += `<td>${d.t}</td>`;
    html += `<td>${avg.toLocaleString('nb-NO')}</td>`;
    d.v.forEach(val => {
      const bg = heatBg(val, useMin, useMax);
      const tc = heatTx(val, useMin, useMax);
      const display = val >= 1000 ? (val/1000).toFixed(1).replace('.0','')+'k' : val;
      html += `<td class="hcell" style="background:${bg};color:${tc}">${display}</td>`;
    });
    html += '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

render();
['search','tagFilter','trackFilter','scaleMode','sortMode','limitMode'].forEach(id =>
  document.getElementById(id).addEventListener(id==='search'?'input':'change', render)
);
